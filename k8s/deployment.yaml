apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hackathon-api
  template:
    metadata:
      labels:
        app: hackathon-api
    spec:
      containers:
        - name: hackathon-api
          image: ECR_REPO_URL_PLACEHOLDER:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "250m"      
              memory: "256Mi"
            limits:
              cpu: "500m"      
              memory: "512Mi"
          envFrom:
            - secretRef:
                name: hackathon-api-secrets
          env:
            - name: FLASK_ENV
              value: "production"